<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hero Travel</title>
    <meta name="description" content="Hero Travel - Explore the world">
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <header id="site-header" class="site-header">
        <div id="header-container" class="header-container">
            <div class="branding">
                <div class="logo">
                    <img src="Images/logo.png" alt="Hero Travel Logo">
                </div>
                <div id="title-name">
                    <h1 class="site-title">Hero Travel</h1>
                </div>
            </div>

            <div class="nav">
                <!-- Hidden checkbox to control menu -->
                <input type="checkbox" id="menu-toggle">

                <!-- Hamburger icon (label for checkbox) -->
                <label for="menu-toggle" class="hamburger">
                    <div class="bar1"></div>
                    <div class="bar2"></div>
                    <div class="bar3"></div>
                </label>

                <!-- Menu items -->
                <div id="Menu">
                    <h2><a href="#home">Home</a></h2>
                    <h2><a href="#packages">Packages</a></h2>
                    <h2><a href="#testimonial">Testimonial</a></h2>
                    <h2><a href="#blog">Blog</a></h2>
                    <h2><a href="#contact">Contact</a></h2>
                </div>
            </div>
        </div>
    </header>
    <main id="site-main">
        <section class="hero">
            <h1 class="hero-title">Explore Your Travel </h1>
            <p class="hero-sub">Designed for the modern explorer. Access premium destinations, expert recommendations,
                and seamless travel planning—all
                tailored to you.
            </p>
            <div class="travel-filters">
                <div class="filter-item"><span><input type="text" placeholder="Where go"></span></div>
                <div class="filter-divider"></div>
                <div id="travel-date" class="filter-item">
                    <div>
                        <span class="date-placeholder"><label for="travel-date">When</label></span>

                    </div>
                    <div><span><input type="date" /></span></div>
                </div>
                <div class="filter-divider"></div>
                <div id="travel-type" class="filter-item"><div><span><label for="travel-type">Select Travel Type</label></span></div>
                <div><span>
                    <select>
                    <option value="" disabled selected></option>
                    <option value="adventure">Adventure</option>
                    <option value="beach">Beach & Relaxation</option>
                    <option value="city">City Break</option>
                    <option value="culture">Culture & History</option>
                    <option value="luxury">Luxury</option>
                    <option value="family">Family</option>
                    <option value="romantic">Romantic</option>
                    <option value="wildlife">Wildlife & Nature</option>
                </select></span></div>
                        
                </div>
                <div class="btn-find">Find Now</div>
            </div>

        </section>

        <section id="about">
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Hero Travel</p>
    </footer>

</body>

</html>
